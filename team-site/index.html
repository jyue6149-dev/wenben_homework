    const cards = document.getElementById('cards');
    const filters = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');
    let currentFilter = '全部';

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = members.filter((member) => {
        const matchesFilter = currentFilter === '全部' || member['类别'] === currentFilter;
        const haystack = [member['姓名'], member['头衔'], member['研究领域']]
          .join(' ')
          .toLowerCase();
        const matchesKeyword = !keyword || haystack.includes(keyword);
        return matchesFilter && matchesKeyword;
      });

      cards.innerHTML = filtered.map((member) => `
        <article class="card">
          <div class="card-top">
            <span class="badge">${member['类别']}</span>
            <h2>${member['姓名']}</h2>
          </div>
          <p class="title">${member['头衔'] || '暂无头衔信息'}</p>
          <div class="research">
            <span class="label">研究领域</span>
            <p>${member['研究领域'] || '页面未明确标注'}</p>
          </div>
          <a class="detail-link" href="${member['详情页']}" target="_blank" rel="noreferrer">查看来源页面</a>
        </article>
      `).join('');

      if (!filtered.length) {
        cards.innerHTML = `
          <div class="empty-state">
            <h2>没有匹配结果</h2>
            <p>可以试试切换分组或缩短搜索词。</p>
          </div>
        `;
      }
    }

    filters.addEventListener('click', (event) => {

      if (!button) return;
      currentFilter = button.dataset.filter;
      document.querySelectorAll('.filter').forEach((item) => item.classList.remove('is-active'));
      button.classList.add('is-active');
      render();
    });

    searchInput.addEventListener('input', render);
    render();
  </script>
